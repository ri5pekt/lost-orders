services:
  web:
    build: ./web
    ports:
      - "127.0.0.1:3003:3000"
    env_file: .env
    depends_on:
      pdf-service:
        condition: service_healthy
    restart: unless-stopped

  pdf-service:
    build: ./pdf-service
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./token.pickle:/app/token.pickle
    environment:
      - GMAIL_EMAIL=${GMAIL_EMAIL:-customerinvoices@particleformen.com}
      - GMAIL_AFTER_DATE=${GMAIL_AFTER_DATE:-2024/01/01}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
